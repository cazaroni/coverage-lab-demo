name: platform-ci

on:
  pull_request:
    paths:
      - "infra/**"
      - "services/api/**"
      - "services/inference/**"
      - "packages/**"
      - "apps/web/Dockerfile"
      - ".github/workflows/platform-ci.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "services/api/**"
      - "services/inference/**"
      - "packages/**"
      - "apps/web/Dockerfile"
      - ".github/workflows/platform-ci.yml"

permissions:
  contents: read
  packages: write

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate dev compose layer
        run: |
          docker compose \
            -f infra/compose/base/docker-compose.yml \
            -f infra/compose/dev/docker-compose.yml \
            config > /tmp/projectedge-dev-compose.yaml

      - name: Validate staging compose layer
        run: |
          docker compose \
            -f infra/compose/base/docker-compose.yml \
            -f infra/compose/staging/docker-compose.yml \
            --profile staging \
            config > /tmp/projectedge-staging-compose.yaml

  build-images:
    runs-on: ubuntu-latest
    needs: validate-compose
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: services/api/Dockerfile
            context: .
          - name: web
            dockerfile: apps/web/Dockerfile
            context: .
          - name: inference
            dockerfile: services/inference/Dockerfile
            context: services/inference
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (optional on PR from forks)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image skeleton
        shell: bash
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            docker buildx build \
              --file "${{ matrix.dockerfile }}" \
              --tag "ghcr.io/${{ github.repository }}/${{ matrix.name }}:${{ github.sha }}" \
              --load \
              "${{ matrix.context }}"
          else
            echo "Skipping ${{ matrix.name }}: missing ${{ matrix.dockerfile }}"
          fi

      - name: Push image skeleton
        if: github.event_name == 'push'
        shell: bash
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            docker image push "ghcr.io/${{ github.repository }}/${{ matrix.name }}:${{ github.sha }}"
          else
            echo "Skipping push for ${{ matrix.name }}"
          fi

  smoke-test:
    runs-on: ubuntu-latest
    needs: validate-compose
    steps:
      - uses: actions/checkout@v4

      - name: Boot lean infra subset for smoke test
        run: |
          docker compose \
            -f infra/compose/base/docker-compose.yml \
            -f infra/compose/dev/docker-compose.yml \
            up -d postgres minio mlflow otel-collector prometheus loki tempo grafana api

      - name: Check service health
        shell: bash
        run: |
          for name in postgres minio mlflow prometheus loki tempo grafana api; do
            status="$(docker inspect --format='{{json .State.Health.Status}}' projectedge-${name}-1 || true)"
            echo "$name => $status"
          done

      - name: Probe API contracts
        shell: bash
        run: |
          curl --fail http://localhost:8000/healthz
          curl --fail http://localhost:8000/session

      - name: Tear down
        if: always()
        run: |
          docker compose \
            -f infra/compose/base/docker-compose.yml \
            -f infra/compose/dev/docker-compose.yml \
            down -v
