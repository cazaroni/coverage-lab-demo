[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "projectedge-analytics"
version = "0.1.0"
description = "Backend-owned analytics contracts and engine interfaces for ProjectEdge."
requires-python = ">=3.11"
dependencies = [
  "duckdb>=1.1,<2.0",
  "pydantic>=2.7,<3.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["projectedge_analytics*"]

