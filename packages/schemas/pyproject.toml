[build-system]
requires = ["setuptools>=69.0"]
build-backend = "setuptools.build_meta"

[project]
name = "projectedge-schemas"
version = "0.1.0"
description = "Phase 0 schema and manifest contracts for ProjectEdge data lake"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pandas>=2.2,<3.0",
  "pandera>=0.20,<1.0",
  "pydantic>=2.7,<3.0",
  "pyarrow>=16.1,<21.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
