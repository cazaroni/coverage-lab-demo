global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: projectedge

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: inference
    metrics_path: /metrics
    static_configs:
      - targets: ["inference:3001"]

  - job_name: realtime
    metrics_path: /metrics
    static_configs:
      - targets: ["realtime:9467"]

  - job_name: chatbot
    metrics_path: /metrics
    static_configs:
      - targets: ["chatbot:9468"]

  - job_name: orchestrator
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator:9469"]
