version: "3.9"

services:
  minio:
    image: minio/minio:RELEASE.2026-03-30T00-00-00Z
    container_name: projectedge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
