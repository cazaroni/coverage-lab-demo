services:
  api:
    build:
      context: ../../..
      dockerfile: services/api/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"

  web:
    build:
      context: ../../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"

  grafana:
    ports:
      - "${GRAFANA_PORT:-3001}:3000"

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  minio:
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  mlflow:
    ports:
      - "${MLFLOW_PORT:-5000}:5000"

  otel-collector:
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"

  prometheus:
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  loki:
    ports:
      - "${LOKI_PORT:-3100}:3100"

  tempo:
    ports:
      - "${TEMPO_PORT:-3200}:3200"

  realtime:
    profiles: ["realtime"]
    ports:
      - "${REALTIME_PORT:-8090}:8090"

  inference:
    profiles: ["inference"]
    build:
      context: ../../../services/inference
      dockerfile: Dockerfile
    ports:
      - "${INFERENCE_PORT:-3001}:3001"

  chatbot:
    profiles: ["chatbot"]
    ports:
      - "${CHATBOT_PORT:-8092}:8092"

  orchestrator:
    profiles: ["orchestrator"]
    ports:
      - "${ORCHESTRATOR_PORT:-8093}:8093"
